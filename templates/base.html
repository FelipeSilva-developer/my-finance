<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#1a5caf">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
    
    <style>
        /* CSS do Modo Escuro */
        body.dark-mode { background: #121212; color: #e0e0e0; }
        body.dark-mode .container, 
        body.dark-mode .panel, 
        body.dark-mode .hero-card, 
        body.dark-mode .metric-card,
        body.dark-mode .help-section { background: #1e1e1e; box-shadow: none; border: 1px solid #333; color: #e0e0e0; }
        body.dark-mode input, body.dark-mode select, body.dark-mode textarea { background-color: #333; color: #fff; border: 1px solid #555; }
        body.dark-mode table { color: #e0e0e0; }
        body.dark-mode th { background-color: #2c2c2c; color: #aaa; }
        body.dark-mode td { border-bottom: 1px solid #333; }
        body.dark-mode .flash-alert { background-color: #333; color: #fff; border: 1px solid #555; }
        body.dark-mode .ghost-button { background: #333; color: #e0e0e0; border-color: #555; }
        body.dark-mode .ghost-button:hover { background: #444; }
        body.dark-mode .counter-pill { background: #333; border-color: #555; color: #ccc; }
        body.dark-mode dialog { background: #1e1e1e; color: #e0e0e0; border: 1px solid #333; }
        
        /* Botões Flutuantes (Ajuda + Tema) */
        .btn-flutuante-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
        .btn-flutuante { background-color: #1a5caf; color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; text-decoration: none; box-shadow: 0 4px 8px rgba(0,0,0,0.3); transition: 0.2s; cursor: pointer; border: none; font-weight: bold; }
        .btn-flutuante:hover { transform: scale(1.1); background-color: #12407a; color: white; }
        .btn-tema { background-color: #333; font-size: 20px; }
        
        /* Ajustes Gerais para Ajuda */
        .help-section h3 { color: #1a5caf; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 15px; margin-top: 0; }
        body.dark-mode .help-section h3 { border-color: #333; color: #4fa3ff; }
        .help-section ul { padding-left: 20px; line-height: 1.6; margin-bottom: 0; }
        .help-section p { margin-top: 0; }
    </style>
</head>
<body>
    <main class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash-alert flash-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        
        {% block content %}{% endblock %}
    </main>

    {% if session.get('user_id') %}
    <div class="btn-flutuante-container">
        <button id="theme-toggle" class="btn-flutuante btn-tema" title="Alternar Modo Escuro">🌙</button>
        <a href="{{ url_for('ajuda') }}" class="btn-flutuante" title="Como usar o sistema?">?</a>
    </div>
    {% endif %}

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('/sw.js'); });
        }

        // Lógica do Modo Escuro
        const toggle = document.getElementById('theme-toggle');
        const body = document.body;
        
        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
            if(toggle) toggle.innerText = '☀️';
        }

        if(toggle) {
            toggle.addEventListener('click', () => {
                body.classList.toggle('dark-mode');
                if (body.classList.contains('dark-mode')) {
                    localStorage.setItem('theme', 'dark');
                    toggle.innerText = '☀️';
                } else {
                    localStorage.setItem('theme', 'light');
                    toggle.innerText = '🌙';
                }
            });
        }
    </script>
</body>
</html>
